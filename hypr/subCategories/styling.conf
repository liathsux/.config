#   DESCRIPTION:
#   Styling decision for hyprland
#
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ GAPS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
general {
#
#   gaps:
#      to other windows:
        gaps_in = 3
#
#      to outer border:
        gaps_out = 3
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ BORDERS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   border width:
    border_size = 3
#
#   active border color:
    col.active_border = rgb(5BCEFA) rgb(F5A9B8) 90deg
#
#   inactive border color:
    col.inactive_border = rgb(808080)
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ LAYOUT
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   layout:
    layout = dwindle
}
#
#   layout config:
    dwindle {
#
#   enable pseudotiling:
    pseudotile = false
#
#   preserve split:
    preserve_split = true
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ BORDER RADIUS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
decoration {
#
#   radius:
    rounding = 10
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ OPACITY
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   active:
    active_opacity = 1.0
#
#   inactive:
    inactive_opacity = 0.97
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ SHADOWS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
shadow {
#
#   enable shadows:
    enabled = true
#
#   shadow strength:
    range = 10
#
#   shadow color:
    color = rgb(1a1a1a)
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ BLUR
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
blur {
#
#   enable blur:
    enabled = true
#
#   blur size:
    size = 6
#
#   blur passes:
    passes = 2
#
#   blur vibrancy: 
    vibrancy = 0.1696
}
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ ANIMATION CONFIGURATION
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
animation {
#
#   advanced animation config:
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
#
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 2.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 0.3, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
