#   DESCRIPTION:
#   Window rules for modified behavior
#
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ IGNORE MAXIMIZE REQUESTS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   ignore maximize request:
    windowrulev2 = suppressevent maximize, class:.*
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ FIX DRAGGING BUGS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   fix dragging bugs:
    windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ MAXIMISED MODIFIED COLOR
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   maximised modified color:
    windowrulev2 = bordercolor rgb(ff0000) rgb(0000ff),fullscreen:1
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ OPAQUE FIREFOX
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
#
#   opaque firefox:
    windowrule = opacity 0.3 override 0.3 override,title:(.*)(- Youtube)
#
