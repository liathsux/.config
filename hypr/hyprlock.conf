#   DESCRIPTION:
#   Config for Hyprlock
#
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ GENERAL SETTINGS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
general{
#
#   only show input field on input:
    ignore_empty_input = true
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ BACKGROUND SETTINGS
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
background{
#
#   main monitor:
#       define monitor:
        monitor = HDMI-A-1
#       set wallpaper:
        path = /home/liath/.config/wallpapers/trans_main.jpg
}
background{
#
#   vertical monitor:
#       define monitor:
        monitor = DP-2
#       set wallpaper:
        path = /home/liath/.config/wallpapers/trans_vertical.jpg
}
background{
#
#   third monitor:
#       define monitor:
        monitor = DP-3
#       set wallpaper:
        path = /home/liath/.config/wallpapers/trans_third.jpg
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ INPUT FIELD
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
input-field {
#
#   monitor:
    monitor = HDMI-A-1
#
#   size:
    size = 200, 50
#
#   outline thickness:
    outline_thickness = 3
#
#   dot size:
    dots_size = 0.33
#
#   dot spacing:
    dot_spacing = 0.15
#
#   center dots:
    dots_center = true
#
#   rounding:
    dots_rounding = -2
#
#   border color:
    outer_color = rgb(5BCEFA) rgb(F5A9B8) 90deg
#
#   background color:
    inner_color = rgb(202020)
#
#   text color:
    font_color = rgb(ffffff)
#
#   hide when empty:
    fade_on_empty = true
#
#   fading time:
    fade_timeout = 5000
#
#   empty box text:
    placeholder_text = Password Required
#
#   input dot rounding:
    rounding = 15
#
#   capslock warning:
    capslock_color = rgb(ff0000)
#
#   numlock warning:
    numlock_color = rgb(ff0000)
#
#   position:
    position = 0, 80
#
#   horizontal alignment:
    halign = center
#
#   vertical alignment:
    valign = bottom
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ TIME DISPLAY
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
label {
#
#   monitor to display:
    monitor = HDMI-A-1
#
#   time:
    text = $TIME
#
#   color:
    color = rgb(ffffff)
#
#   text size:
    font_size = 50
#
#   font:
    font_family = Fira Semibold
#
#   position:
    position = 0, 200
#
#   horizontal alignment:
    halign = center
#
#   vertical alignment:
    valign = bottom
}
#
#
#
#   в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
#   в•‘ USER DISPLAY
#   в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җвҳҪгҖҗвқ–гҖ‘вҳҫв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ
label {
#
#   monitor to display:
    monitor = HDMI-A-1
#
#   display user:
    text = $USER is a good girl
#
#   color:
    color = rgb(ffffff)
#
#   text size:
    font_size = 30
#
#   font:
    font_family = Fira Semibold
#
#   position:
    position = 0, 150
#
#   horizontal alignment:
    halign = center
#
#   vertical alignment:
    valign = bottom
}
